<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Casas Goianita Consignação</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 24px;
        }
        .login-card {
            background-color: var(--bg-secondary);
            color: #ffffff;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 460px;
            padding: 48px;
            text-align: center;
        }
        .login-logo {
            margin-bottom: 32px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .login-footer {
            margin-top: 32px;
            font-size: 13px;
            color: #e6e1da;
        }
        .login-toggle {
            margin-top: 24px;
            font-size: 13px;
            color: #c8c0b8;
        }
        .login-toggle a {
            color: var(--accent-gold);
            text-decoration: underline;
            cursor: pointer;
        }
        .login-toggle a:hover {
            color: #e6b84a;
        }
        .section-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 8px 0 20px 0;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) {
            .login-card { padding: 32px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo.png" alt="Logo Goianita Novo de novo" style="width: 150px; height: auto; margin-bottom: 12px; filter: brightness(0) invert(1);">
                <div>
                    <span style="color: white; font-size: 26px; font-weight: 700; display: block;">Goianita Novo de novo</span>
                    <span style="color: var(--accent-gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; display: block; margin-top: 4px;">Comodato &amp; Consignação</span>
                </div>
            </div>

            <!-- ===== FORMULÁRIO DE LOGIN ===== -->
            <div id="section-login">
                <form class="login-form" id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="username" style="color: #e6e1da;">CPF (Cliente) ou E-mail (Admin)</label>
                        <input type="text" id="username" class="form-control" placeholder="000.000.000-00 ou e-mail" required style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password" style="color: #e6e1da;">Senha de Acesso</label>
                        <input type="password" id="password" class="form-control" placeholder="Sua senha" required style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                    </div>
                    <button type="submit" id="btn-login" class="btn btn-gold" style="padding: 16px; font-size: 16px; margin-top: 12px;">Entrar no Sistema</button>
                </form>

                <div class="login-toggle">
                    Administrador sem acesso? <a id="link-para-cadastro">Primeiro acesso &rarr;</a>
                </div>
            </div>

            <!-- ===== FORMULÁRIO DE CADASTRO (PRIMEIRO ACESSO ADMIN) ===== -->
            <div id="section-cadastro" style="display: none;">
                <p class="section-title">Cadastro de Administrador</p>
                <hr class="section-divider">
                <form class="login-form" id="cadastro-form">
                    <div class="form-group">
                        <label class="form-label" for="cad-email" style="color: #e6e1da;">E-mail Corporativo</label>
                        <input type="email" id="cad-email" class="form-control" placeholder="seu@email.com.br" required style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cad-senha" style="color: #e6e1da;">Criar Senha</label>
                        <input type="password" id="cad-senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6" style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cad-confirma" style="color: #e6e1da;">Confirmar Senha</label>
                        <input type="password" id="cad-confirma" class="form-control" placeholder="Repita a senha" required minlength="6" style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                    </div>
                    <button type="submit" id="btn-cadastrar" class="btn btn-gold" style="padding: 16px; font-size: 16px; margin-top: 12px;">Criar Conta e Entrar</button>
                </form>

                <div class="login-toggle">
                    <a id="link-para-login">&larr; Voltar ao Login</a>
                </div>
            </div>

            <div class="login-footer">
                <p>&copy; 2026 Casas Goianita. Todos os direitos reservados.</p>
                <p style="font-size: 11px; margin-top: 8px; color: var(--accent-gold);">Módulo de ReCommerce &amp; Economia Circular</p>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        // ─────────────────────────────────────────────
        // CONFIGURAÇÃO: e-mails de admins autorizados
        // Para adicionar novos admins, basta incluir o e-mail nesta lista.
        // ─────────────────────────────────────────────
        const ADMINS_AUTORIZADOS = [
            'admin@goianita.com.br',
            'debora@goianita.com.br',
            'eduardfreitasg@gmail.com',
            'goianita@terra.com.br',
            'karinne@goianita.com.br'
        ];

        // Atalhos de digitação → e-mail completo
        const ATALHOS_ADMIN = {
            'admin':    'admin@goianita.com.br',
            'debora':   'debora@goianita.com.br',
            'eduard':   'eduardfreitasg@gmail.com',
            'goianita': 'goianita@terra.com.br',
            'karinne':  'karinne@goianita.com.br'
        };

        // ─────────────────────────────────────────────
        // ALTERNAR ENTRE LOGIN E CADASTRO
        // ─────────────────────────────────────────────
        document.getElementById('link-para-cadastro').addEventListener('click', () => {
            document.getElementById('section-login').style.display = 'none';
            document.getElementById('section-cadastro').style.display = 'block';
            document.getElementById('cad-email').focus();
        });

        document.getElementById('link-para-login').addEventListener('click', () => {
            document.getElementById('section-cadastro').style.display = 'none';
            document.getElementById('section-login').style.display = 'block';
            document.getElementById('username').focus();
        });

        // ─────────────────────────────────────────────
        // LOGIN NORMAL
        // ─────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn  = document.getElementById('btn-login');

            const lowerUser  = user.toLowerCase();
            const isAdmin    = lowerUser.includes('@') || Object.keys(ATALHOS_ADMIN).includes(lowerUser);
            const adminEmail = ATALHOS_ADMIN[lowerUser] || lowerUser;

            if (isAdmin) {
                // Modo offline
                if (typeof firebase === 'undefined' || !window.GoianitaAuth) {
                    if (pass === 'goianita123') {
                        sessionStorage.setItem('goianita_role', 'admin');
                        sessionStorage.setItem('goianita_email', adminEmail);
                        sessionStorage.removeItem('goianita_cliente_id');
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Senha incorreta (modo offline).');
                    }
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Autenticando...';

                window.GoianitaAuth.signInWithEmailAndPassword(adminEmail, pass)
                    .then(() => {
                        sessionStorage.setItem('goianita_role', 'admin');
                        sessionStorage.setItem('goianita_email', adminEmail);
                        sessionStorage.removeItem('goianita_cliente_id');
                        window.location.href = 'dashboard.html';
                    })
                    .catch(err => {
                        // Se a conta não existe, sugere o cadastro
                        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                            if (confirm('Conta não encontrada para este e-mail.\n\nDeseja fazer seu primeiro acesso e criar uma senha?')) {
                                document.getElementById('section-login').style.display = 'none';
                                document.getElementById('section-cadastro').style.display = 'block';
                                document.getElementById('cad-email').value = adminEmail;
                                document.getElementById('cad-senha').focus();
                            }
                        } else {
                            alert('Senha incorreta ou erro de autenticação.\n\nDetalhes: ' + err.message);
                        }
                        btn.disabled = false;
                        btn.textContent = 'Entrar no Sistema';
                    });
                return;
            }

            // ── Login Cliente (CPF) ──
            const cleanCpf = user.replace(/\D/g, '');
            if (!cleanCpf) {
                alert('Por favor, insira o CPF (para clientes) ou e-mail (para administradores).');
                return;
            }

            const emailCpf = cleanCpf + '@goianita.com.br';

            if (typeof firebase === 'undefined' || !window.GoianitaAuth) {
                const clientes = window.GoianitaDB.clientes.getAll();
                const cli = clientes.find(c => c.cpf.replace(/\D/g, '') === cleanCpf);
                if (cli) {
                    sessionStorage.setItem('goianita_role', 'user');
                    sessionStorage.setItem('goianita_cliente_id', cli.id);
                    window.location.href = 'pages/cliente-detalhe.html?id=' + cli.id;
                } else {
                    alert('CPF não cadastrado.');
                }
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Autenticando...';

            window.GoianitaAuth.signInWithEmailAndPassword(emailCpf, pass)
                .then(userCredential => {
                    const clientes = window.GoianitaDB.clientes.getAll();
                    const cli = clientes.find(c => c.cpf.replace(/\D/g, '') === cleanCpf);
                    if (cli) {
                        sessionStorage.setItem('goianita_role', 'user');
                        sessionStorage.setItem('goianita_cliente_id', cli.id);
                        sessionStorage.setItem('goianita_user_name', cli.nome);
                        sessionStorage.setItem('goianita_email', emailCpf);
                        window.location.href = 'pages/cliente-detalhe.html?id=' + cli.id;
                    } else {
                        const basicCli = {
                            nome: userCredential.user.displayName || 'Fornecedor',
                            cpf: user,
                            telefone: '',
                            email: userCredential.user.email,
                            chavePixType: 'CPF',
                            chavePix: user,
                            comissaoPadrao: 50
                        };
                        window.GoianitaDB.clientes.save(basicCli).then(saved => {
                            sessionStorage.setItem('goianita_role', 'user');
                            sessionStorage.setItem('goianita_cliente_id', saved.id);
                            sessionStorage.setItem('goianita_user_name', saved.nome);
                            sessionStorage.setItem('goianita_email', emailCpf);
                            window.location.href = 'pages/cliente-detalhe.html?id=' + saved.id;
                        });
                    }
                })
                .catch(() => {
                    alert('CPF ou senha incorretos.');
                    btn.disabled = false;
                    btn.textContent = 'Entrar no Sistema';
                });
        });

        // ─────────────────────────────────────────────
        // CADASTRO DE PRIMEIRO ACESSO (ADMIN)
        // ─────────────────────────────────────────────
        document.getElementById('cadastro-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Traduzir atalhos no momento do cadastro também
            const rawEmail = document.getElementById('cad-email').value.trim().toLowerCase();
            const email = ATALHOS_ADMIN[rawEmail] || rawEmail;
            const senha    = document.getElementById('cad-senha').value;
            const confirma = document.getElementById('cad-confirma').value;
            const btn      = document.getElementById('btn-cadastrar');

            // Atualiza o campo com o e-mail completo para ficar visível pro usuário
            document.getElementById('cad-email').value = email;

            // Validar senhas
            if (senha !== confirma) {
                alert('As senhas não coincidem. Por favor, verifique.');
                return;
            }

            // Validar se o e-mail é autorizado
            if (!ADMINS_AUTORIZADOS.includes(email)) {
                alert('Este e-mail não está na lista de administradores autorizados.\n\nEntre em contato com o administrador do sistema para liberar seu acesso.');
                return;
            }

            if (typeof firebase === 'undefined' || !window.GoianitaAuth) {
                alert('Sem conexão com o Firebase. Tente novamente com internet.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Criando conta...';

            window.GoianitaAuth.createUserWithEmailAndPassword(email, senha)
                .then(() => {
                    sessionStorage.setItem('goianita_role', 'admin');
                    sessionStorage.setItem('goianita_email', email);
                    sessionStorage.removeItem('goianita_cliente_id');
                    window.location.href = 'dashboard.html';
                })
                .catch(err => {
                    if (err.code === 'auth/email-already-in-use') {
                        alert('Este e-mail já possui uma conta cadastrada.\n\nVolte ao login e use sua senha habitual.');
                        document.getElementById('section-cadastro').style.display = 'none';
                        document.getElementById('section-login').style.display = 'block';
                        document.getElementById('username').value = email;
                        document.getElementById('password').focus();
                    } else if (err.code === 'auth/weak-password') {
                        alert('Senha muito fraca. Use pelo menos 6 caracteres com letras e números.');
                    } else {
                        alert('Erro ao criar conta:\n' + err.message);
                    }
                    btn.disabled = false;
                    btn.textContent = 'Criar Conta e Entrar';
                });
        });
    </script>
</body>
</html>
