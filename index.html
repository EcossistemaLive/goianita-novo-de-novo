<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Casas Goianita Consignação</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 24px;
        }
        .login-card {
            background-color: var(--bg-secondary); /* Verde Musgo */
            color: #ffffff;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 460px;
            padding: 48px;
            text-align: center;
        }
        .login-logo {
            margin-bottom: 32px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .login-logo .logo-text {
            font-size: 24px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .login-footer {
            margin-top: 32px;
            font-size: 13px;
            color: #e6e1da;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo.png" alt="Logo Goianita Novo de novo" style="width: 150px; height: auto; margin-bottom: 12px; filter: brightness(0) invert(1);">
                <div>
                    <span class="logo-text" style="color: white; font-size: 26px; font-weight: 700; display: block;">Goianita Novo de novo</span>
                    <span class="logo-sub" style="color: var(--accent-gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; display: block; margin-top: 4px;">Comodato & Consignação</span>
                </div>
            </div>
            
             <form class="login-form" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username" style="color: #e6e1da;">CPF (Cliente) ou E-mail (Admin)</label>
                    <input type="text" id="username" class="form-control" placeholder="000.000.000-00 ou e-mail" required value="" style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password" style="color: #e6e1da;">Senha de Acesso</label>
                    <input type="password" id="password" class="form-control" placeholder="Sua senha" required value="" style="background-color: rgba(255,255,255,0.9); color: var(--text-main);">
                </div>
                
                <button type="submit" class="btn btn-gold" style="padding: 16px; font-size: 16px; margin-top: 12px;">Entrar no Sistema</button>
            </form>
            
            <div class="login-footer">
                <p>&copy; 2026 Casas Goianita. Todos os direitos reservados.</p>
                <p style="font-size: 11px; margin-top: 8px; color: var(--accent-gold);">Módulo de ReCommerce & Economia Circular</p>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btnSubmit = document.querySelector('button[type="submit"]');

            const lowerUser = user.toLowerCase();

            // Detectar se o login é de administrador (qualquer e-mail ou atalhos)
            const isAdminEmail = lowerUser.includes('@') || 
                                 lowerUser === 'admin' || 
                                 lowerUser === 'eduard' || 
                                 lowerUser === 'debora';
            
            if (isAdminEmail) {
                let adminEmail = lowerUser;
                if (lowerUser === 'admin') adminEmail = 'admin@goianita.com.br';
                else if (lowerUser === 'debora') adminEmail = 'debora@goianita.com.br';
                else if (lowerUser === 'eduard') adminEmail = 'eduardfreitasg@gmail.com';
                
                if (typeof firebase === 'undefined' || !window.GoianitaAuth) {
                    // Fallback local se estiver offline
                    if (pass === 'goianita123') {
                        sessionStorage.setItem('goianita_role', 'admin');
                        sessionStorage.setItem('goianita_email', adminEmail);
                        sessionStorage.removeItem('goianita_cliente_id');
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Senha incorreta (fallback offline).');
                    }
                    return;
                }

                btnSubmit.disabled = true;
                btnSubmit.textContent = 'Autenticando Admin...';

                window.GoianitaAuth.signInWithEmailAndPassword(adminEmail, pass)
                    .then(() => {
                        sessionStorage.setItem('goianita_role', 'admin');
                        sessionStorage.setItem('goianita_email', adminEmail);
                        sessionStorage.removeItem('goianita_cliente_id');
                        window.location.href = 'dashboard.html';
                    })
                    .catch(error => {
                        alert('Falha no login do Administrador: E-mail ou senha incorretos.\n\nDetalhes: ' + error.message);
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = 'Entrar no Sistema';
                    });
                return;
            }
            
            // Login Cliente (CPF)
            const cleanCpf = user.replace(/\D/g, '');
            if (!cleanCpf) {
                alert('Por favor, insira o usuário (CPF para clientes ou E-mail para administradores).');
                return;
            }
            
            const email = cleanCpf + '@goianita.com.br';
            
            if (typeof firebase === 'undefined' || !window.GoianitaAuth) {
                // Fallback local se estiver sem Firebase carregado
                const clientes = window.GoianitaDB.clientes.getAll();
                const clienteEncontrado = clientes.find(c => c.cpf.replace(/\D/g, '') === cleanCpf);
                
                if (clienteEncontrado) {
                    sessionStorage.setItem('goianita_role', 'user');
                    sessionStorage.setItem('goianita_cliente_id', clienteEncontrado.id);
                    window.location.href = 'pages/cliente-detalhe.html?id=' + clienteEncontrado.id;
                } else {
                    alert('CPF não cadastrado.');
                }
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Autenticando...';

            window.GoianitaAuth.signInWithEmailAndPassword(email, pass)
                .then(userCredential => {
                    const clientes = window.GoianitaDB.clientes.getAll();
                    const clienteEncontrado = clientes.find(c => c.cpf.replace(/\D/g, '') === cleanCpf);
                    
                    if (clienteEncontrado) {
                        sessionStorage.setItem('goianita_role', 'user');
                        sessionStorage.setItem('goianita_cliente_id', clienteEncontrado.id);
                        sessionStorage.setItem('goianita_user_name', clienteEncontrado.nome);
                        sessionStorage.setItem('goianita_email', email);
                        window.location.href = 'pages/cliente-detalhe.html?id=' + clienteEncontrado.id;
                    } else {
                        // Se o Auth foi mas não temos o cadastro local, cria perfil básico
                        const basicCliente = {
                            nome: userCredential.user.displayName || "Fornecedor Novo",
                            cpf: user,
                            telefone: "",
                            email: userCredential.user.email,
                            chavePixType: "CPF",
                            chavePix: user,
                            comissaoPadrao: 50
                        };
                        window.GoianitaDB.clientes.save(basicCliente).then(saved => {
                            sessionStorage.setItem('goianita_role', 'user');
                            sessionStorage.setItem('goianita_cliente_id', saved.id);
                            sessionStorage.setItem('goianita_user_name', saved.nome);
                            sessionStorage.setItem('goianita_email', email);
                            window.location.href = 'pages/cliente-detalhe.html?id=' + saved.id;
                        });
                    }
                })
                .catch(error => {
                    alert('Falha na autenticação: CPF ou Senha incorretos.');
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = 'Entrar no Sistema';
                });
        });
    </script>
</body>
</html>
